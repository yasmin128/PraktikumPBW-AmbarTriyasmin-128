<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTS - AMBAR TRIYASMIN</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="form-section">
        <h3>KOPERASI MINI</h3>
        <p>Halo! Silakan isi untuk membeli alat tulis.</p>

        <form action="proses.php" method="post">
          <label for="name">Nama Lengkap:</label>
          <input
            type="text"
            name="username"
            placeholder="Masukkan nama anda"
            required
            minlength="3"
            maxlength="20"
          />

          <label for="nim">NIM:</label>
          <input
            type="number"
            name="nim"
            placeholder="Masukkan NIM anda"
            required
          />

          <label for="email">Email:</label>
          <input
            type="email"
            name="email"
            placeholder="Masukkan email anda"
            required
          />

          <label for="">Jenis Layanan:</label>
          <div class="radio-group">
            <input type="radio" name="layanan1" value="R" />Reguler
            <input type="radio" name="layanan2" value="P" />Prioritas
          </div>
          
          <label for="">Pilih Barang:</label>
          <div class="checkbox-group">
            <input type="checkbox" name="barang[]" value="pulpen" />Pulpen
            <input type="checkbox" name="barang[]" value="pensil" />Pensil
            <input type="checkbox" name="barang[]" value="buku" />Buku
            <input type="checkbox" name="barang[]" value="penghapus" />Penghapus
          </div>

          <label for="jumlahbarang">Jumlah Beli Pulpen:</label>
          <input
            type="number"
            name="jumlah[pulpen]"
            required
          />

          <label for="jumlahbarang">Jumlah Beli Pensil:</label>
          <input
            type="number"
            name="jumlah[pensil]"
            required
          />

          <label for="jumlahbarang">Jumlah Beli Penghapus:</label>
          <input
            type="number"
            name="jumlah[penghapus]"
            required
          />

          <label for="jumlahbarang">Jumlah Beli Buku:</label>
          <input
            type="number"
            name="jumlah[buku]"
            required
          />

          <button type="submit">Kirim</button>
        </form>
    </div>
  </body>
</html>
