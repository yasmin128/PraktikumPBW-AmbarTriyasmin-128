<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Cek Nilai</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Cek Nilai Yuk!</h2>
      <p>Silakan masukkan Nama, NPM dan Nilai untuk mengetahui huruf mutu.</p>

      <label>Nama Lengkap:</label>
      <input type="text" id="nama" placeholder="Masukkan nama anda" required />

      <label>NPM:</label>
      <input type="text" id="npm" placeholder="Masukkan NPM anda" />

      <label>Nilai:</label>
      <input type="number" id="nilai" placeholder="Masukkan Nilai(0-100):" />

      <button onclick="cekNilai()">Cek Nilai</button>

      <div id="hasil"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
